<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><title>Credentials - Zen-iOS</title><link rel="stylesheet" href="core.css">
    <style>
        .vault-item { display: flex; align-items: center; justify-content: space-between; padding: 24px; background: var(--card-bg); border-radius: 20px; border: 1px solid var(--line); margin-bottom: 16px; transition: 0.3s; }
        .vault-item:hover { transform: translateX(8px); border-color: var(--accent); }
        .secret-mask { font-family: var(--font-mono); letter-spacing: 4px; color: var(--text-muted); }
        .vault-icon { width: 44px; height: 44px; background: var(--bg-base); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="app-shell">
        <aside class="sidebar">
            <div class="sidebar-header"><div class="eyebrow">Professional</div><h1>Doggy Box</h1></div>
            <nav style="margin-top: 40px;">
                <ul class="nav-list">
                    <li><a href="workbench.html" class="nav-link"><span>🛠️</span> 开发工具</a></li>
                    <li><a href="commands.html" class="nav-link"><span>💻</span> 命令管理</a></li>
                    <li><a href="http-lab.html" class="nav-link"><span>🌐</span> HTTP 实验室</a></li>
                    <li><a href="ai-chat.html" class="nav-link"><span>🧠</span> AI 灵感空间</a></li>
                    <li><a href="credentials.html" class="nav-link active"><span>🔐</span> 凭证管理器</a></li>
                    <li><a href="prompts.html" class="nav-link"><span>📝</span> Prompt 模板</a></li>
                    <li><a href="backup.html" class="nav-link"><span>☁️</span> 备份与迁移</a></li>
                </ul>
            </nav>
        </aside>
        <main class="viewport">
            <header class="view-header"><div class="eyebrow">Encrypted Vault</div></header>
            <div class="view-content fade-in">
                <div class="header-group" style="margin-bottom: 40px;"><h2>凭证安全中心</h2></div>
                <div class="vault-item">
                    <div style="display:flex; gap:20px; align-items:center;">
                        <div class="vault-icon">🔑</div>
                        <div><div style="font-weight:700;">OpenAI API Key</div><div style="font-size:12px; color:var(--text-muted);">生产环境 · 已锁定</div></div>
                    </div>
                    <div class="secret-mask">********************</div>
                    <button style="background:var(--bg-base); border:1px solid var(--line); padding:8px 16px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer;">查看内容</button>
                </div>
                <div class="vault-item">
                    <div style="display:flex; gap:20px; align-items:center;">
                        <div class="vault-icon">📡</div>
                        <div><div style="font-weight:700;">AWS S3 Secret</div><div style="font-size:12px; color:var(--text-muted);">备份存储 · 自动同步</div></div>
                    </div>
                    <div class="secret-mask">********************</div>
                    <button style="background:var(--bg-base); border:1px solid var(--line); padding:8px 16px; border-radius:10px; font-size:12px; font-weight:700; cursor:pointer;">查看内容</button>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
