<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zen-iOS Prototype Explorer</title>
    <link rel="stylesheet" href="core.css">
    <style>
        .explorer-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; padding: 48px; }
        .page-card { padding: 40px; text-align: center; text-decoration: none; color: var(--text-main); }
        .page-card:hover { border-color: var(--accent); }
        .page-card h3 { margin: 16px 0 8px; }
        .page-card p { font-size: 12px; color: var(--text-muted); }
    </style>
</head>
<body>
    <div class="blob"></div>
    <div class="viewport" style="width:100%; height:100vh; overflow-y:auto;">
        <header style="padding: 60px 48px 20px; text-align: center;">
            <div class="eyebrow">Design System Showcase</div>
            <h1 style="font-size: 48px; font-weight: 900; letter-spacing: -0.06em; margin: 0;">Zen-iOS Hybrid Prototype</h1>
            <p style="color:var(--text-muted); margin-top:20px; font-size:18px;">点击下方卡片，预览重构后的页面设计方案。</p>
        </header>

        <div class="explorer-grid">
            <a href="workbench.html" class="zen-card page-card">
                <div style="font-size:32px;">🛠️</div>
                <h3>Workbench</h3>
                <p>开发工具首页网格布局</p>
            </a>
            <a href="http-lab.html" class="zen-card page-card">
                <div style="font-size:32px;">🌐</div>
                <h3>HTTP Lab</h3>
                <p>分栏式专业 API 调试器</p>
            </a>
            <a href="ai-chat.html" class="zen-card page-card">
                <div style="font-size:32px;">🧠</div>
                <h3>AI Chat</h3>
                <p>沉浸式 AI 对话与模型控制</p>
            </a>
            <a href="commands.html" class="zen-card page-card">
                <div style="font-size:32px;">💻</div>
                <h3>Commands</h3>
                <p>自动化脚本与控制台管理</p>
            </a>
            <a href="credentials.html" class="zen-card page-card">
                <div style="font-size:32px;">🔐</div>
                <h3>Credentials</h3>
                <p>保险库级敏感信息管理</p>
            </a>
            <a href="prompts.html" class="zen-card page-card">
                <div style="font-size:32px;">📝</div>
                <h3>Prompts</h3>
                <p>变量化提示词工程编辑器</p>
            </a>
            <a href="backup.html" class="zen-card page-card">
                <div style="font-size:32px;">☁️</div>
                <h3>Backup</h3>
                <p>向导式备份与云迁移流</p>
            </a>
        </div>
    </div>
</body>
</html>
